<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Account Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 100%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --positive: #10b981;
      --negative: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-panel:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.15);
    }

    .header-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      outline: none;
      flex: 1;
      transition: border-color 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .account-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-title {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .transactions {
      margin-top: 2rem;
    }

    .transactions h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .txn-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .txn-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .txn-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--glass-border);
      transform: translateX(5px);
    }

    .txn-info {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .txn-desc {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .txn-date {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .txn-amount {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .amount-positive { color: var(--positive); }
    .amount-negative { color: var(--negative); }

    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin: 2rem auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error-msg {
      color: var(--negative);
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glass-panel">
      <h1>Dashboard</h1>
      <p class="subtitle">Real-time banking insights</p>

      <div class="header-controls">
        <input type="text" id="accountIdInput" placeholder="Enter Account ID" value="acc-100">
        <button onclick="loadDashboard()">Fetch Data</button>
      </div>

      <div class="loader" id="loader"></div>
      <div id="error-msg"></div>

      <div id="dashboard-content" style="display: none;">
        <div class="account-summary">
          <div class="stat-card">
            <div class="stat-title">Owner</div>
            <div class="stat-value" id="val-owner">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Balance</div>
            <div class="stat-value" id="val-balance">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Status</div>
            <div class="stat-value" id="val-status">--</div>
          </div>
        </div>

        <div class="transactions">
          <h2>Recent Transactions</h2>
          <div class="txn-list" id="txn-list">
            <!-- Transactions injected here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8081/api/accounts';

    function formatCurrency(amount, currency) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(amount);
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadDashboard() {
      const accountId = document.getElementById('accountIdInput').value.trim();
      if(!accountId) return;

      const loader = document.getElementById('loader');
      const content = document.getElementById('dashboard-content');
      const errorMsg = document.getElementById('error-msg');

      loader.style.display = 'block';
      content.style.display = 'none';
      errorMsg.style.display = 'none';

      try {
        // Fetch Account Status
        const accRes = await fetch(`${API_BASE}/${accountId}`);
        if (!accRes.ok) throw new Error('Account not found or server error');
        const account = await accRes.json();

        // Fetch Transactions
        const txRes = await fetch(`${API_BASE}/${accountId}/transactions?page=1&pageSize=10`);
        const txData = txRes.ok ? await txRes.json() : { items: [] };

        // Populate Summary
        document.getElementById('val-owner').innerText = account.ownerName;
        document.getElementById('val-balance').innerText = formatCurrency(account.balance, account.currency);
        document.getElementById('val-status').innerText = account.status;
        
        let statusColor = '#a1a1aa';
        if(account.status === 'OPEN') statusColor = 'var(--positive)';
        if(account.status === 'CLOSED') statusColor = 'var(--negative)';
        document.getElementById('val-status').style.color = statusColor;

        // Populate Transactions
        const list = document.getElementById('txn-list');
        list.innerHTML = '';

        if (txData.items && txData.items.length > 0) {
          txData.items.forEach(tx => {
            const isDeposit = tx.type === 'DEPOSIT';
            const amountClass = isDeposit ? 'amount-positive' : 'amount-negative';
            const sign = isDeposit ? '+' : '-';
            
            list.innerHTML += `
              <div class="txn-item">
                <div class="txn-info">
                  <div class="txn-desc">${tx.description || tx.type}</div>
                  <div class="txn-date">${formatDate(tx.timestamp)}</div>
                </div>
                <div class="txn-amount ${amountClass}">
                  ${sign}${formatCurrency(tx.amount, account.currency)}
                </div>
              </div>
            `;
          });
        } else {
          list.innerHTML = '<div style="color: var(--text-muted);">No transactions found.</div>';
        }

        // Show dashboard
        content.style.display = 'block';

      } catch (err) {
        errorMsg.innerText = err.message;
        errorMsg.style.display = 'block';
      } finally {
        loader.style.display = 'none';
      }
    }

    // Auto load on start
    window.onload = () => {
      loadDashboard();
    };
  </script>
</body>
</html>
